name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @mpfe/shared build

      - name: Build deep-agent package
        # apps/api's typecheck imports from @mpfe/deep-agent, which exposes
        # `./dist/index.d.ts` via the `types` field in its package.json. The
        # typecheck step therefore needs the deep-agent dist on disk.
        run: pnpm --filter @mpfe/deep-agent build

      - name: Typecheck
        run: pnpm -r typecheck

      # `pnpm -r lint` is intentionally not part of CI yet: the API still
      # uses legacy `.eslintrc.cjs` while ESLint 9 expects flat config, and
      # `next lint` opens an interactive setup prompt when no web ESLint
      # config exists. `next build` still runs Next's non-interactive checks.
      - name: Build
        run: pnpm -r build

      - name: API unit tests
        run: pnpm --filter @mpfe/api exec tsx --test "src/**/*.test.ts"
